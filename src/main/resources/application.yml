# SprintLog Boot의 기본 설정 파일
# Spring Boot가 초기화 될 때 항상 이 파일을 읽는다.

info:
  app:
    name: SprintLog
    description: 학습 기록 서비스
    version: 1.0.0
    encoding: UTF-8
    java-version: 17

  company:
    name: MyCompany
    email: support@mycompany.com
    website: https://mycompany.com

  team:
    developer: Backend Team
    manager: John Doe
    contact: backend-team@mycompany.com

spring:
  application:
    name: sprintlog-boot

  profiles:
    active: dev

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 20MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics # 꼭 필요한 정보만 노출
      base-path: /management # 경로도 바꿔서 숨김

  endpoint:
    health:
      show-details: always # 개발 환경에서는 always, 운영에서는 when-authorized(허가된 사람만 요청 가능하도록)
  info:
    env:
      enabled: true
  server:
    port: 9090 # Actuator 전용 포트 (방화벽 같은데에서 Actuator는 허용된 ip만 접근이 가능하도록 막음)

springdoc:
  swagger-ui:
    path: /api-docs-ui.html # UI page 경로
    tags-sorter: alpha # 태그 정렬 방식 (알파벳순)
    operations-sorter: method # 메서드 정렬 방식
    display-request-duration: true # 요청과 응답에 소요된 시간 표시
    doc-expansion: list # 문서 펼침 상태 (none, list, full)

  api-docs:
    path: /my-api # Swagger가 우리 API의 정보를 얻어오기 위해서 요청하는 url

sprintlog:
  welcome-message: "SprintLog Boot - 외부 설정 시연(기본)"
  sample-data:
    enabled: true
    count: 4
  file-directory: /Users/stephen/Desktop/codeit-13th-develop/spring-upload
